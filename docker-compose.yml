version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: privacy-postgres
    restart: always
    environment:
      POSTGRES_DB: privacy_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
